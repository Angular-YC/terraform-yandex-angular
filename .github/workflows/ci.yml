name: CI

on:
  pull_request:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init angular_yc module
        run: terraform -chdir=modules/angular_yc init -backend=false
      - name: Validate angular_yc module
        run: terraform -chdir=modules/angular_yc validate
      - name: Init core_security module
        run: terraform -chdir=modules/core_security init -backend=false
      - name: Validate core_security module
        run: terraform -chdir=modules/core_security validate
      - name: Init ydb_docapi module
        run: terraform -chdir=modules/ydb_docapi init -backend=false
      - name: Validate ydb_docapi module
        run: terraform -chdir=modules/ydb_docapi validate
